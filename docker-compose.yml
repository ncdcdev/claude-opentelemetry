services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./otelcol-config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - ./otel.htpasswd:/etc/otelcol-contrib/otel.htpasswd:ro
    ports:
      # localhost のみバインド（nginx 経由でのみ外部公開）
      - "127.0.0.1:4318:4318"
    restart: unless-stopped
    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      # OTLP/HTTP で Collector からメトリクスを受信（/api/v1/otlp/v1/metrics）
      - --web.enable-otlp-receiver
      # OpenTelemetry 由来の delta 暫定メトリクスを cumulative に変換して TSDB に載せる
      - --enable-feature=otlp-deltatocumulative
      - --storage.tsdb.retention.time=90d
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "127.0.0.1:3100:3100"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    user: "1000:1000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    env_file:
      - .env
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

volumes:
  prometheus_data:
  loki_data:
  grafana_data:
