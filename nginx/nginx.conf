# OTel Collector と Grafana を別サブドメインで公開する
# TLS 証明書は certbot (Let's Encrypt) で取得・管理する

# --- OTel Collector (otel.yourdomain.com) ---
server {
    listen 443 ssl;
    server_name ${OTEL_DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${OTEL_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${OTEL_DOMAIN}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://127.0.0.1:4318;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;

        # OTLP HTTP は大きなボディを送る場合がある
        client_max_body_size 10m;
    }
}

# --- Grafana (grafana.yourdomain.com) ---
server {
    listen 443 ssl;
    server_name ${GRAFANA_DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${GRAFANA_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${GRAFANA_DOMAIN}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;

        # Grafana WebSocket（Live 機能）
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_http_version 1.1;
    }
}

# HTTP → HTTPS リダイレクト
server {
    listen 80;
    server_name ${OTEL_DOMAIN} ${GRAFANA_DOMAIN};
    return 301 https://$host$request_uri;
}
