extensions:
  basicauth/otlp:
    htpasswd:
      # 平文の bcrypt を .env に書くと Docker Compose が $ を壊すため、ホストのファイルをマウントする。
      file: /etc/otelcol-contrib/otel.htpasswd

receivers:
  otlp:
    protocols:
      http:
        auth:
          authenticator: basicauth/otlp
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 10s

exporters:
  # Prometheus 3 の OTLP 受信（/api/v1/otlp/v1/metrics）。remote write より delta 暫定メトリクスと相性が良い。
  otlphttp/prometheus:
    endpoint: http://prometheus:9090/api/v1/otlp
    tls:
      insecure: true
  otlp_http/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true
  debug:
    verbosity: basic

service:
  extensions: [basicauth/otlp]
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http/loki, debug]
